version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: myapp_test
    networks:
      - test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/${IMAGE_NAME}/app:sha-${GITHUB_SHA}
    environment:
      DB_HOST: postgres
      DB_PASSWORD: secret
      DB_NAME: myapp_test
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - test-network

  nginx:
    image: ghcr.io/${IMAGE_NAME}/nginx:sha-${GITHUB_SHA}
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - test-network

networks:
  test-network: